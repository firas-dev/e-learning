name: API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Start backend
        working-directory: ./backend
        env:
          MONGO_URI: mongodb://localhost:27017/eduverse_test
          JWT_SECRET: ci-test-secret
          PORT: '5000'
        run: |
          npm run dev &
          npx wait-on http://localhost:5000 --timeout 60000

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run API tests
        working-directory: ./qa
        run: |
          newman run EduVerseAI.postman_collection.json \
            -e EduVerseAI.postman_environment.json \
            -r cli,htmlextra \
            --reporter-htmlextra-export newman-report/report.html

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: qa/newman-report/report.html